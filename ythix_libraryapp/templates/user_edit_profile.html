{% extends 'user_base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4">
               
                <div class="card-body p-4 p-md-5">
                    {% if request.resolver_match.url_name == 'edit_profile' %}
                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    {% endif %}
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-12 text-center mb-4">
                                {% if profile.image %}
                                <img src="{{ profile.image.url }}" class="rounded-circle border shadow-sm mb-3"
                                    style="width: 120px; height: 120px; object-fit: cover;">
                                {% endif %}
                                <div class="mx-auto" style="max-width: 300px;">
                                    <label class="form-label small fw-bold">Update Profile Picture</label>
                                    <input type="file" name="image" class="form-control form-control-sm">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">First Name</label>
                                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Last Name</label>
                                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email (@gmail.com)</label>
                                <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Contact Number</label>
                                <input type="text" name="contact_no" class="form-control"
                                    value="{{ profile.contact_no }}" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Residential Address</label>
                                <textarea name="address" class="form-control" rows="3"
                                    required>{{ profile.address }}</textarea>
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-5 rounded-pill fw-bold">Save
                                Changes</button>
                            <a href="{% url 'user_profile' %}"
                                class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
