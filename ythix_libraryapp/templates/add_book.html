{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-5 page-bg">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="card shadow-lg border-0 mt-4" style="border-radius: 15px; background: rgba(255, 255, 255, 0.95);">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark text-uppercase">Add New Book</h3>
                        <p class="text-muted small">Library Inventory Management</p>
                        <hr class="w-25 mx-auto">
                    </div>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">BOOK TITLE</label>
                            <input type="text" name="name" class="form-control border-1 shadow-sm" placeholder="Enter title" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted">AUTHOR</label>
                                <select name="author" class="form-select shadow-sm" required>
                                    <option value="" selected disabled>Select Author...</option>
                                    {% for a in authors %}
                                        <option value="{{ a.id }}">{{ a.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted">CATEGORY</label>
                                <select name="type" class="form-select shadow-sm" required>
                                    <option value="" selected disabled>Select Category...</option>
                                    {% for t in types %}
                                        <option value="{{ t.id }}">{{ t.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted">PUBLISHER</label>
                                <select name="publisher" class="form-select shadow-sm" required>
                                    <option value="" selected disabled>Select Publisher...</option>
                                    {% for p in publishers %}
                                        <option value="{{ p.id }}">{{ p.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-muted">PRICE (₹)</label>
                                <input type="number" step="0.01" name="price" class="form-control shadow-sm" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">STOCK QUANTITY</label>
                            <input type="number" name="stock" class="form-control shadow-sm" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">BOOK DESCRIPTION</label>
                            <textarea name="description" class="form-control shadow-sm" rows="4" placeholder="Briefly describe the book plot..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">COVER IMAGE</label>
                            <input type="file" name="image" class="form-control shadow-sm" accept="image/*" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow">Save to Library</button>
                            <a href="{% url 'show_books' %}" class="btn btn-link text-decoration-none text-muted small">Cancel and Return</a>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<style>
    .page-bg {
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                    url('{% static "assets/book1.jpeg" %}') no-repeat center center; 
        background-size: cover;
        min-height: 100vh;
        margin: 0;
        padding-bottom: 3rem;
    }
</style>
{% endblock %}
